<!doctype html>
<title>{% block title %}{% endblock %} - Cores Preferidas</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<nav>
  <h1>Cores Preferidas</h1>

  <ul>
    {% if g.user %}
      <li>{{ g.user['username'] }}</li>
      <li>
        <a href="{{ url_for('auth.logout') }}">Sair</a>
      </li>
    {% else %}
      <li>
        <a href="{{ url_for('auth.register') }}">Cadastrar</a>
      </li>
      <li>
        <a href="{{ url_for('auth.login') }}">Entrar</a>
      </li>
    {% endif %}
  </ul>
</nav>

<section class="content">

  {% for message in get_flashed_messages() %}
    <div class="flash">
      {{ message }}
    </div>
  {% endfor %}

  {% block content %}{% endblock %}

</section>
